name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 安装前端依赖
        run: npm install

      - name: 构建前端
        run: npm run build

      - name: 构建 Rust 二进制
        run: cargo build --release --target x86_64-pc-windows-msvc
        working-directory: src-tauri

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'workFlow-xun ${{ github.ref_name }}'
          body: |
            查看 CHANGELOG.md 了解本次更新内容。
          draft: false
          prerelease: false
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/workflow-ui.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/workFlow.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
